name: navassist
description: A new Flutter project for an assistive navigation system for deafblind individuals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  vibration: ^1.8.3
  camera: ^0.10.5+9
  flutter_blue_plus: ^1.31.0
  geolocator: ^10.1.0
  tflite_flutter: ^0.10.4
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_tts: ^4.0.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/mobilenet.tflite
    - assets/models/labels.txt
